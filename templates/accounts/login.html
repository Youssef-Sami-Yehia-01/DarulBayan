{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Log in — Darulbayan</title>
    <link rel="icon" type="image/png" href="{% static 'img/logo.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caladea:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/variables.css' %}">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/components/forms.css' %}">
    <link rel="stylesheet" href="{% static 'css/panel/panel.css' %}">
</head>
<body class="login-body">
    <main class="login-card">
        <span class="logo-badge login-card__badge"><img class="login-card__logo" src="{% static 'img/logo.png' %}" alt="Darulbayan logo"></span>
        <h1 class="login-card__title">Log in</h1>
        {% if form.errors %}
            <div class="form-errors"><p>Your username and password didn't match. Please try again.</p></div>
        {% endif %}
        <form method="post" novalidate>
            {% csrf_token %}
            {% include "components/form_fields.html" %}
            <button class="btn btn--primary btn--block" type="submit">Log in</button>
        </form>
    </main>
</body>
</html>
