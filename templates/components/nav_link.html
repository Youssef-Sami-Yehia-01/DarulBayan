{% comment %}
Navigation link with active-state highlighting, shared by the public header
and the panel sidebar. Params: url_name, label, key (matches nav_active from
NavSectionMixin), css (base class, e.g. "site-nav__link").
{% endcomment %}
<a class="{{ css }}{% if nav_active == key %} {{ css }}--active{% endif %}" href="{% url url_name %}">{{ label }}</a>
